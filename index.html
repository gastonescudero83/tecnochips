<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2b2722" />
  <meta name="description" content="TECNOCHIP'S — Electro & Hogar. Celulares, Smart TV, consolas y tecnología. Pedidos por WhatsApp. Funciona offline." />

  <title>TECNOCHIP'S — Electro & Hogar</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TECNOCHIP'S" />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/storefront.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <!-- ETAPA 5 — Plataforma comercial (aditivo, namespaced .e5-*) -->
  <link rel="stylesheet" href="css/etapa5.css" />
  <!-- ETAPA 6 — Asistente Inteligente "TECNO" (aditivo, namespaced .ast-*) -->
  <link rel="stylesheet" href="css/asistente.css" />
</head>
<body>
  <!-- Splash de carga inicial -->
  <div id="splash" class="splash">
    <div class="splash__spinner" aria-hidden="true"></div>
    <p class="splash__text">Cargando tienda…</p>
  </div>

  <!-- Raíz de la tienda (cliente) -->
  <div id="storefront-root"></div>

  <!-- Raíz del panel de administración (se muestra en #/admin) -->
  <div id="admin-root" hidden></div>

  <!-- =========================================================================
       Módulos (scripts clásicos, sin ES modules, para funcionar también en
       file://). El ORDEN importa: cada uno cuelga de window.App.
       ====================================================================== -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/store.js"></script>
  <!-- seed.js (~330KB) se carga BAJO DEMANDA desde store.js: solo hace falta
       en el primer arranque o tras un reset de fábrica. -->
  <script src="js/images.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/search.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/importexport.js"></script>
  <script src="js/smart-import.js"></script>
  <!-- Sistema modular de parsers por proveedor (Strategy + Factory) -->
  <script src="js/parsers/parser-system.js"></script>
  <script src="js/parsers/motor_geometrico.js"></script>
  <script src="js/parsers/providers/prov_distrimax.js"></script>
  <script src="js/parsers/providers/prov_mercado_x.js"></script>
  <script src="js/parsers/providers/prov_electrodomesticos.js"></script>
  <script src="js/parsers/providers/prov_excel_generico.js"></script>
  <script src="js/parsers/providers/prov_pdf_generico.js"></script>
  <script src="js/parsers/providers/prov_mapeo_asistido.js"></script>
  <!-- Lienzo visual de mapeo asistido (UI para proveedores nuevos) -->
  <script src="js/parsers/ui-mapeo-asistido.js"></script>
  <script src="js/router.js"></script>
  <script src="js/ui-storefront.js"></script>
  <script src="js/ui-admin.js"></script>
  <script src="js/ui-admin-import.js"></script>

  <!-- =========================================================================
       ETAPA 5 — Plataforma Comercial Profesional (módulos aditivos).
       Cuelgan de window.App.E5 y guardan datos en el store 'kv' existente
       (sin modificar el esquema de IndexedDB ni la funcionalidad previa).
       Orden: primero el cimiento (data), luego módulos que dependen de él.
       ====================================================================== -->
  <!-- PARTE 1: cimiento + auditoría + seguridad + integraciones -->
  <script src="js/etapa5/e5-data.js"></script>
  <script src="js/etapa5/e5-history.js"></script>
  <script src="js/etapa5/e5-security.js"></script>
  <script src="js/etapa5/e5-integrations.js"></script>
  <!-- PARTE 2: promociones, banners, marcas, categorías inteligentes -->
  <script src="js/etapa5/e5-promotions.js"></script>
  <script src="js/etapa5/e5-banners.js"></script>
  <script src="js/etapa5/e5-brands.js"></script>
  <script src="js/etapa5/e5-categories.js"></script>
  <script src="js/etapa5/ui-admin-etapa5.js"></script>
  <!-- PARTE 3: comparador, favoritos, compartir, búsqueda, relacionados -->
  <script src="js/etapa5/e5-favorites.js"></script>
  <script src="js/etapa5/e5-compare.js"></script>
  <script src="js/etapa5/e5-share.js"></script>
  <script src="js/etapa5/e5-related.js"></script>
  <script src="js/etapa5/e5-search-suggest.js"></script>
  <script src="js/etapa5/ui-storefront-etapa5.js"></script>
  <!-- PARTE 4: gestión masiva, config general, SEO, optimización, exportaciones -->
  <script src="js/etapa5/e5-export.js"></script>
  <script src="js/etapa5/e5-bulk.js"></script>
  <script src="js/etapa5/e5-seo.js"></script>
  <script src="js/etapa5/e5-optimize.js"></script>
  <script src="js/etapa5/e5-config.js"></script>
  <script src="js/etapa5/ui-admin-etapa5-p4.js"></script>

  <!-- =========================================================================
       ETAPA 6 — Asistente Inteligente de Compras "TECNO" (módulos aditivos).
       Vendedor virtual 100% local y offline: NO usa APIs de IA ni servicios de
       pago. Reutiliza App.Search (búsqueda), App.Store (catálogo/precios),
       App.Cart, App.WhatsApp y App.E5. Cuelga de window.App.Asst y guarda su
       config/FAQ en IndexedDB (sin tocar el esquema ni la funcionalidad previa).
       Orden: config → datos → comprensión (NLU) → motor → UI → panel admin.
       ====================================================================== -->
  <script src="js/asistente/ast-config.js"></script>
  <script src="js/asistente/ast-data.js"></script>
  <script src="js/asistente/ast-nlu.js"></script>
  <script src="js/asistente/ast-engine.js"></script>
  <script src="js/asistente/ast-ui.js"></script>
  <script src="js/asistente/ast-admin.js"></script>

  <script src="js/app.js"></script>
</body>
</html>
